server:
  port: 8080

spring:
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/users,/users/**

    loadbalancer:
      health-check:
        enabled: true
      retry:
        enabled: true

eureka:
  client:
    service-url:
      defaultZone: http://host.docker.internal:8761/eureka