server:
  port: 8080

spring:
  cloud:
    gateway:
      routes:
        - id: USER-SERVICE
          uri: lb://user-service
          predicates:
            - Path=/users,/users/**

    loadbalancer:
      health-check:
        enabled: true
      retry:
        enabled: true

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://host.docker.internal:8761/eureka

  instance:
    prefer-ip-address: true